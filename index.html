<html lang="de">

<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta name="viewport" user-scalable="no">
    <meta http-equiv="“cache-control“" content="“no-cache" no-store="" must-revalidate“="">
    <meta http-equiv="“pragma“" content="“no-cache“">
    <meta http-equiv="“expires“" content="“0″">


    <title>Zerfallende Würfel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <style>
        button {
            background-color: #4CAF50;
            /* Green */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            margin: auto;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #3e8e41;
        }
        
        button.save {
            background-color: #008CBA;
            /* Blue */
        }
        /* Fadenkreuz */
        
        .crosshair {
            pointer-events: none;
            /* Verhindert, dass das Fadenkreuz das Maus-Event stört */
        }
        
        .crosshair line {
            stroke: #333;
            /* Farbe des Fadenkreuzes */
            stroke-width: 1px;
            /* Breite des Fadenkreuzes */
            stroke-dasharray: 3, 3;
            /* Gestrichelte Linie */
        }
        /* Tooltip */
        
        .tooltip {
            font-family: sans-serif;
            font-size: 12px;
            pointer-events: none;
            /* Verhindert, dass das Tooltip-Textfeld das Maus-Event stört */
        }
        
        .tooltip text {
            fill: #333;
            /* Textfarbe */
            font-weight: bold;
        }
        
        .grid {
            margin: auto;
            align-items: center;
            position: relative;
        }
        
        .dice {
            width: 5px;
            height: 5px;
            position: absolute;
            font-size: 8px;
            top: 100px;
            left: 100px;
            text-align: center;
            vertical-align: center;
            background: #dd0;
            border: solid;
            border-width: 1px;
            border-radius: 2px;
        }
        
        .red {
            background-color: red;
        }
        
        .chart {
            background: url("Hintergrund_Diagramm.png");
            background-repeat: no-repeat;
            background-size: cover;
            width: 75%;
            height: 200px;
            border: 1px solid black;
            margin-top: 5px;
            margin-left: 10px;
            padding: 20px;
            margin-button: 20px;
        }
        
        .lable {
            width: 500px;
            margin-top: 20px;
            margin-left: 10px;
        }
        
        .Messtabelle {
            margin-left: 2vw;
            border-collapse: collapse;
        }
        
        table {
            border: 1px solid;
            overflow: scroll;
        }
        
        td,
        th {
            border: 1px solid;
        }
        
        td {
            width: 30px;
            padding: 5px;
            text-align: center;
            font-size: smaller;
            white-space: nowrap;
        }
        
        .chartcontainer {
            /* display: -webkit-flex;
            display: flex;*/
            /*align-items: center;
            justify-content: center;*/
            width: 100%;
            margin: auto;
            margin-top: 20px;
            background: #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        .bar1 {
            width: 3px;
            margin-right: 1px;
            display: inline-block;
            background-color: blue;
        }
        
        .bar2 {
            width: 3px;
            margin-right: 1px;
            display: inline-block;
            background-color: red;
        }
        
        .counter {
            width: 100%;
            text-align: center;
            font-weight: bold;
            margin: auto;
            margin-bottom: 5px;
            padding: 5px;
        }
        
        .six {
            background: #f00;
            background-repeat: no-repeat;
            background-size: auto;
        }
        /* Media query for responsive button */
        
        @media only screen and (max-width: 1200px) {
            button {
                width: 100%;
            }
            .start{
              display  : bloxk;
        }
        
        #popup {
            display: none;
            background-color: #eee;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        #popup-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            background-color: #fff;
            overflow: auto;
            padding: 20px;
        }
    </style>
</head>

<body>

    <h2>Zerfall von Cubetonium</h2>
    <div style="align: Center; width: 100%;">
        <button onclick="start()" id="Start" style="display:none;margin-left: 0px;">Zeitsprung</button>
        <button onclick="restart()" id="Restart" style="margin-left: 0px;">Restart</button>
        <button onclick="saveChart()" class="save">Diagramm anzeigen</button> Atomanzahl:
        <select name="N-Würfel" id="myRange">
            <option value="50">50</option>
            <option value="10000">10000</option>
            <option value="25000">25000</option>
            <option value="50000">50000</option>
          </select>
    </div>
    <div class="chartcontainer">
        <div class="slidecontainer">
            Atomanzahl: <span id="demo">50</span>
        </div>
        <div style="overflow-x: scroll;">
            <table class="Messtabelle">
                <tbody>
                    <tr id="wurf" class="lable">
                        <td>Zeit</td>
                    </tr>
                    <tr id="messwert" class="lable">
                        <td>zerfallene" Isotope</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="counter" class="counter">Verbliebende Cubetonium-Atome:</div>
    <div id="DownloadContainer" style="display:none;">
        <svg id="v4"></svg>
    </div>


    <!--
    <div class="chartcontainer" id="chart">
        <div class="chart" id="chart1">
        </div>
    </div>
    -->


    <div class="grid" id="grid">
        <div class="dice" id="die0" style="width: 164px; height: 164px; border-radius: 82px; top: 0px; left: 163.333px;">2</div>
        <div class="dice" id="die2" style="width: 164px; height: 164px; border-radius: 82px; top: 0px; left: 491.333px;">2</div>
    </div>

        <div id="popup-content" onclick="ausblenden()"></div>
    </div>

</body>
